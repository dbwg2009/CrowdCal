name = "crowdcal-worker"
workers_dev = true
compatibility_date = "2026-05-27"
main = "./worker/index.ts"

[[d1_databases]]
binding = "DB"
database_name = "crowdcal"
database_id = "854d529d-d517-4abc-ae68-ff4b346bba5c"
migrations_dir = "db/migrations"

[vars]
# Set these in .dev.vars for local dev
# SPOTIFY_CLIENT_ID = ""
# SPOTIFY_CLIENT_SECRET = ""
# SPOTIFY_REFRESH_TOKEN = ""

# Pages configuration
[env.production]
pages_build_output_dir = "frontend"
vars = { ADMIN_PASSWORD = "" }

# Build script to generate config with secrets
[env.production.build]
command = "node scripts/build-frontend-config.js"
watch_paths = ["frontend/**/*.js"]
